$kind: http-request
description: >-
  Matches the current issue submission call after location confirmation.


  This lets you verify that the backend receives and stores the coordinates
  returned by Geoapify.


  Requires a valid Firebase Bearer token for a citizen user.
url: "{{baseUrl}}/api/issues"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{authToken}}
body:
  type: text
  content: |-
    {
      "title": "{{title}}",
      "description": "{{description}}",
      "categoryId": {{categoryId}},
      "addressLine1": "{{addressLine1}}",
      "addressLine2": "{{addressLine2}}",
      "suburb": "{{suburb}}",
      "area": "{{area}}",
      "city": "{{city}}",
      "county": "{{county}}",
      "latitude": {{latitude}},
      "longitude": {{longitude}}
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Issue created successfully', function () {
        pm.expect([200, 201]).to.include(pm.response.code);
      });

      const json = pm.response.json();
      if (json?.issue?.caseId) {
        pm.collectionVariables.set('createdCaseId', json.issue.caseId);
      }
      console.log('Created issue response:', json);
    language: text/javascript
order: 2000

$kind: http-request
description: |-
  Matches the current ReportIssue manual confirm call.

  Frontend logic:
  searchText = [addressLine1, addressLine2, suburb, area, city, county].filter(Boolean).join(', ')
  GET https://api.geoapify.com/v1/geocode/search?text=...&filter=countrycode:ie&apiKey=...

  The frontend currently accepts the first result only.
url: https://api.geoapify.com/v1/geocode/search?text={{encodedSearchText}}&filter=countrycode:ie&apiKey={{geoapifyApiKey}}
method: GET
queryParams:
  text: "{{encodedSearchText}}"
  filter: countrycode:ie
  apiKey: "{{geoapifyApiKey}}"
scripts:
  - type: beforeRequest
    code: >-
      const parts = [
        pm.collectionVariables.get('addressLine1'),
        pm.collectionVariables.get('addressLine2'),
        pm.collectionVariables.get('suburb'),
        pm.collectionVariables.get('area'),
        pm.collectionVariables.get('city'),
        pm.collectionVariables.get('county')
      ];

      const searchText = parts.filter(Boolean).join(', ');

      pm.collectionVariables.set('searchText', searchText);

      pm.collectionVariables.set('encodedSearchText',
      encodeURIComponent(searchText));

      console.log('Geoapify searchText:', searchText);
    language: text/javascript
  - type: afterResponse
    code: >-
      pm.test('Status is 200', function () {
        pm.response.to.have.status(200);
      });


      const json = pm.response.json();

      const feature = json?.features?.[0]?.properties;


      pm.test('At least one Geoapify result exists', function () {
        pm.expect(feature).to.exist;
      });


      if (feature) {
        pm.collectionVariables.set('latitude', String(feature.lat ?? ''));
        pm.collectionVariables.set('longitude', String(feature.lon ?? ''));
        pm.collectionVariables.set('geoapifyPostcode', feature.postcode || '');
        pm.collectionVariables.set('geoapifySuburb', feature.suburb || feature.neighbourhood || feature.district || feature.city || '');
        pm.collectionVariables.set('geoapifyFormatted', feature.formatted || '');
        console.log('First result accepted by current frontend behavior:', feature);
      }
    language: text/javascript
order: 1000

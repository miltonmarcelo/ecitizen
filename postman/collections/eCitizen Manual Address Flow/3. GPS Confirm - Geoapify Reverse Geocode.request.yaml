$kind: http-request
description: Optional comparison request. This matches the GPS confirm flow, not
  the manual confirm flow. Included only so you can compare both
  implementations.
url: https://api.geoapify.com/v1/geocode/reverse?lat={{latitude}}&lon={{longitude}}&format=json&apiKey={{geoapifyApiKey}}
method: GET
queryParams:
  lat: "{{latitude}}"
  lon: "{{longitude}}"
  format: json
  apiKey: "{{geoapifyApiKey}}"
order: 3000

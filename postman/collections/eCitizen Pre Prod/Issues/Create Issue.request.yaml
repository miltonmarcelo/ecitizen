$kind: http-request
name: Create Issue
url: "{{baseUrl}}/api/issues"
method: POST
headers:
  Authorization: Bearer {{firebaseToken}}
  Content-Type: application/json
body:
  type: json
  content: >-
    {
      "title": "Street light not working",
      "description": "The street light outside number 12 is off for the last 3 nights.",
      "categoryId": 1,
      "addressLine1": "12 Main Street",
      "addressLine2": "",
      "town": "Ranelagh",
      "city": "Dublin",
      "county": "Dublin",
      "eircode": "D06 TEST"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Issue created successfully", function () {
        pm.response.to.have.status(201);
      });

      const json = pm.response.json();

      if (json.issue && json.issue.caseId) {
        pm.collectionVariables.set("caseId", json.issue.caseId);
      }
    language: text/javascript
order: 1775409342531

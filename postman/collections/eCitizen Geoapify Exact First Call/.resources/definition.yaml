$kind: collection
description: |-
  Single request Postman collection that reproduces the exact first Geoapify call used in the manual address confirmation flow.

  Frontend logic reproduced exactly:
  const searchText = [addressLine1, addressLine2, suburb, area, city, county]
    .filter(Boolean)
    .join(', ');

  Then:
  GET https://api.geoapify.com/v1/geocode/search?text=<searchText>&filter=countrycode:ie&apiKey=<apiKey>
variables:
  geoapifyApiKey: ""
  addressLine1: 12 O'Connell Street Lower
  addressLine2: ""
  suburb: North City
  area: Dublin 1
  city: Dublin
  county: Dublin
  searchText: ""
  latitude: ""
  longitude: ""
  formattedAddress: ""
